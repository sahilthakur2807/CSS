<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Static Positioning</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f8fafc;color:#0f172a}
  .card{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(2,6,23,0.06)}
  pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px;overflow:auto}
  .flow{background:#fff;padding:12px;border-radius:8px;border:1px solid #e6eef8}
  .item{padding:12px;background:#eef2ff;border-radius:6px;margin-bottom:8px}
</style>
</head>
<body>
  <div class="card">
    <h1>Static Positioning</h1>
    <p><strong>Theory:</strong> <code>position: static</code> is the default — elements follow normal document flow and ignore <code>top/left</code> offsets.</p>
    <p><strong>Usage:</strong> Most elements are fine with static positioning; use other modes when you need offsets or layering.</p>

    <h2>Demo</h2>
    <div class="flow">
      <div class="item">Item 1 (static)</div>
      <div class="item">Item 2 (static)</div>
      <div class="item">Item 3 (static)</div>
    </div>
  </div>
</body>
</html>
