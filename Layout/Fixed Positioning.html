<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fixed Positioning</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f8fafc;color:#0f172a}
  .card{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(2,6,23,0.06)}
  pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px;overflow:auto}
  .fixed{position:fixed;top:12px;right:12px;background:#f59e0b;color:#fff;padding:10px;border-radius:6px}
  .spacer{height:2000px}
</style>
</head>
<body>
  <div class="card">
    <h1>Fixed Positioning</h1>
    <p><strong>Theory:</strong> <code>position: fixed</code> positions an element relative to the viewport; it stays in place during scrolling.</p>
    <p><strong>Usage:</strong> Good for sticky headers, floating action buttons, or persistent UI controls.</p>

    <h2>Demo</h2>
    <div class="fixed">Fixed top-right</div>
    <div class="spacer">Scroll the page to see the fixed element stay put.</div>
  </div>
</body>
</html>
