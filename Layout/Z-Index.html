<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Z-Index</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f8fafc;color:#0f172a}
  .card{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(2,6,23,0.06)}
  pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px;overflow:auto}
  .stack{position:relative;height:180px;margin-top:12px}
  .a{position:absolute;top:20px;left:20px;width:140px;height:80px;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center}
  .b{position:absolute;top:40px;left:80px;width:140px;height:80px;background:#ef4444;color:#fff;display:flex;align-items:center;justify-content:center}
  .c{position:absolute;top:80px;left:140px;width:140px;height:80px;background:#10b981;color:#fff;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
  <div class="card">
    <h1>Z-Index</h1>
    <p><strong>Theory:</strong> <code>z-index</code> controls stacking order of positioned elements (higher values appear on top).</p>
    <p><strong>Usage:</strong> Use to manage overlapping UI layers (modals, dropdowns, tooltips). Only works on positioned elements.</p>

    <h2>Demo</h2>
    <div class="stack">
      <div class="a" style="z-index:10">z-index:10</div>
      <div class="b" style="z-index:5">z-index:5</div>
      <div class="c" style="z-index:15">z-index:15</div>
    </div>
  </div>
</body>
</html>
